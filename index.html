/* ============ STATE (localStorage) ============ */
const LS_KEY = "aiyisi_kb_manual_v1";
const LS_NOTE = "aiyisi_kb_notes_v1";
function loadManual(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{products:[],scripts:[],intel:[],certs:[]}}catch(e){return{products:[],scripts:[],intel:[],certs:[]}}}
function saveManual(m){localStorage.setItem(LS_KEY,JSON.stringify(m))}
function loadNotes(){try{return JSON.parse(localStorage.getItem(LS_NOTE))||{}}catch(e){return{}}}
function saveNotes(n){localStorage.setItem(LS_NOTE,JSON.stringify(n))}
let MANUAL = loadManual();
let NOTES = loadNotes();

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)}

  <div class="toolbar">
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="ssearch" placeholder="搜索话术 / 场景 / 编号..." value="${esc(filter)}"></div>
    <div class="count">${list.length} 条</div>
  </div>
  ${list.map(s=>`<div class="qrow">
    <button class="copy" onclick="copyTxt(\`${esc(s.c)}\`)">复制</button>
    <div class="q">${s.id} · ${esc(s.t)}</div>
    <div class="a">${esc(s.c)}</div>
    <div class="meta">场景：${esc(s.cat)}${s.manual?' · 手动新增':''}</div>
  </div>`).join("")}`;
}

function renderBrand(){
  return `<div class="sec-title"><span class="bar"></span>品牌资产</div>
  <div class="sec-sub">品牌定位、核心品类、市场与背书 —— 对外宣传与统一口径基础。</div>
  ${BRAND.map(b=>`<div class="qrow"><div class="q">${esc(b.t)}</div><div class="a">${esc(b.d)}</div></div>`).join("")}`;
}

function manualList(type,arr,fields){
  if(!arr.length) return `<div class="empty">暂无手动新增内容</div>`;
  return arr.map((it,i)=>`<div class="manual-item">
    <div class="mi-body"><b>${esc(it[fields[0]]||'(无标题)')}</b><br>${esc((it[fields[1]]||'').slice(0,160))}${(it[fields[1]]||'').length>160?'...':''}</div>
    <button class="del" onclick="delManual('${type}',${i})">删除</button>
  </div>`).join("");
}

function renderSettings(){
  return `<div class="sec-title"><span class="bar"></span>网站设置</div>
  <div class="sec-sub">手动新增 / 删除知识库内容。仅作用于手动条目，不影响系统自带 40 款产品与 20 条话术。内容保存在当前浏览器本地。</div>

  <div class="panel">
    <h3>① 新增产品</h3>
    <div class="field"><label>产品名称</label><input id="np_name" placeholder="如：New PP Reversible Outdoor Rug 8x10"></div>
    <div class="field"><label>价格（可选）</label><input id="np_price" placeholder="如：$6.5-9.0"></div>
    <div class="field"><label>起订量（可选）</label><input id="np_moq" placeholder="如：200 pieces"></div>
    <div class="field"><label>图片链接（可选）</label><input id="np_img" placeholder="https://...jpg"></div>
    <div class="field"><label>详情链接（可选）</label><input id="np_url" placeholder="https://www.alibaba.com/product-detail/..."></div>
    <button class="btn" onclick="addProduct()">保存产品</button>
  </div>

  <div class="panel">
    <h3>② 新增话术</h3>
    <div class="field"><label>场景分类</label><input id="ns_cat" placeholder="如：报价 / 催单 / 售后"></div>
    <div class="field"><label>话术标题</label><input id="ns_title" placeholder="如：大客户专属折扣话术"></div>
    <div class="field"><label>话术内容</label><textarea id="ns_content" placeholder="输入话术正文..."></textarea></div>
    <button class="btn" onclick="addScript()">保存话术</button>
  </div>

  <div class="panel">
    <h3>③ 新增客户情报 / 画像</h3>
    <div class="field"><label>标题</label><input id="ni_title" placeholder="如：德国买家偏好"></div>
    <div class="field"><label>内容</label><textarea id="ni_content" placeholder="输入情报内容..."></textarea></div>
    <button class="btn" onclick="addIntel()">保存情报</button>
  </div>

  <div class="panel">
    <h3>④ 新增资质 / 背书</h3>
    <div class="field"><label>标题</label><input id="nc_title" placeholder="如：BSCI 认证"></div>
    <div class="field"><label>内容</label><textarea id="nc_content" placeholder="输入资质内容..."></textarea></div>
    <button class="btn" onclick="addCert()">保存资质</button>
  </div>

  <div class="panel">
    <h3>已手动新增内容（可单条删除）</h3>
    <p style="color:var(--txt2);font-size:13px;margin-bottom:10px">产品（${MANUAL.products.length}）</p>${manualList('products',MANUAL.products,['name','price'])}
    <p style="color:var(--txt2);font-size:13px;margin:14px 0 10px">话术（${MANUAL.scripts.length}）</p>${manualList('scripts',MANUAL.scripts,['t','c'])}
    <p style="color:var(--txt2);font-size:13px;margin:14px 0 10px">情报（${MANUAL.intel.length}）</p>${manualList('intel',MANUAL.intel,['t','d'])}
    <p style="color:var(--txt2);font-size:13px;margin:14px 0 10px">资质（${MANUAL.certs.length}）</p>${manualList('certs',MANUAL.certs,['t','d'])}
    <div style="margin-top:18px"><button class="btn btn-danger" onclick="clearAll()">清空全部手动新增内容</button></div>
  </div>`;
}

/* ============ ACTIONS ============ */
function copyTxt(t){navigator.clipboard.writeText(t).then(()=>toast("已复制")).catch(()=>toast("复制失败"))}
let pcount=parseInt(localStorage.getItem("aiyisi_pcount")||"0");
function nextPid(){pcount++;localStorage.setItem("aiyisi_pcount",pcount);return"AY-M"+String(pcount).padStart(2,"0")}
let scount=parseInt(localStorage.getItem("aiyisi_scount")||"0");
function nextSid(){scount++;localStorage.setItem("aiyisi_scount",scount);return"S-M"+String(scount).padStart(2,"0")}

function addProduct(){
  const name=document.getElementById("np_name").value.trim();
  if(!name){toast("请填写产品名称");return}
  MANUAL.products.push({id:nextPid(),name,price:document.getElementById("np_price").value.trim(),moq:document.getElementById("np_moq").value.trim(),img:document.getElementById("np_img").value.trim()||"https://s.alicdn.com/@img/imgextra/i1/O1CN01YyMrnH1TH65JNfJZU_!!6000000002356-2-tps-600-600.png",url:document.getElementById("np_url").value.trim(),manual:true});
  saveManual(MANUAL);toast("产品已新增");show('settings');
}
function addScript(){
  const t=document.getElementById("ns_title").value.trim();
  if(!t){toast("请填写话术标题");return}
  MANUAL.scripts.push({id:nextSid(),cat:document.getElementById("ns_cat").value.trim()||"自定义",t,c:document.getElementById("ns_content").value.trim(),manual:true});
  saveManual(MANUAL);toast("话术已新增");show('settings');
}
function addIntel(){
  const t=document.getElementById("ni_title").value.trim();
  if(!t){toast("请填写标题");return}
  MANUAL.intel.push({t,d:document.getElementById("ni_content").value.trim(),manual:true});
  saveManual(MANUAL);toast("情报已新增");show('settings');
}
function addCert(){
  const t=document.getElementById("nc_title").value.trim();
  if(!t){toast("请填写标题");return}
  MANUAL.certs.push({t,d:document.getElementById("nc_content").value.trim(),manual:true});
  saveManual(MANUAL);toast("资质已新增");show('settings');
}
function delManual(type,i){MANUAL[type].splice(i,1);saveManual(MANUAL);toast("已删除");show('settings');}
function clearAll(){if(confirm("确定清空全部手动新增内容？系统自带内容不受影响。")){MANUAL={products:[],scripts:[],intel:[],certs:[]};saveManual(MANUAL);toast("已清空");show('settings');}}

/* ============ ADMIN MODE ============ */
/* 管理员模式：链接带 ?admin=1 才显示「网站设置」。对外公开链接（不带参数）为纯净只读版。 */
const IS_ADMIN = /[?&]admin=1\b/.test(location.search);
(function setupAdmin(){
  const sBtn=document.querySelector('#nav button[data-t="settings"]');
  if(sBtn && !IS_ADMIN) sBtn.style.display="none";
})();

/* ============ ROUTER ============ */
const VIEWS={home:renderHome,identity:renderIdentity,products:renderProducts,intel:renderIntel,scripts:renderScripts,brand:renderBrand,settings:renderSettings};
function show(t){
  if(t==="settings" && !IS_ADMIN){t="home";}
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.t===t));
  main.innerHTML=VIEWS[t]();
  document.querySelectorAll("section").forEach(s=>s.classList.add("show"));
  if(t==="products"){const i=document.getElementById("psearch");if(i){i.addEventListener("input",e=>{const v=e.target.value;main.innerHTML=renderProducts(v);const ni=document.getElementById("psearch");ni.focus();ni.setSelectionRange(v.length,v.length);bindNotes();});}bindNotes();}
  if(t==="scripts"){const i=document.getElementById("ssearch");if(i){i.addEventListener("input",e=>{const v=e.target.value;main.innerHTML=renderScripts(v);const ni=document.getElementById("ssearch");ni.focus();ni.setSelectionRange(v.length,v.length);});}}
  window.scrollTo({top:0,behavior:"smooth"});
}
function bindNotes(){document.querySelectorAll("[data-note]").forEach(ta=>{ta.addEventListener("change",e=>{NOTES[e.target.dataset.note]=e.target.value;saveNotes(NOTES);toast("备注已保存");});});}
document.getElementById("nav").addEventListener("click",e=>{if(e.target.dataset.t)show(e.target.dataset.t);});
show("home");
</script>
</body>
</html>
