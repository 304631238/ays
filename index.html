<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱以思 · 公司知识库 | Taizhou Aiyisi Leisure Products</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel2:#222c36; --line:#2d3a47;
    --txt:#e8eef3; --txt2:#9fb0c0; --accent:#2f9e6e; --accent2:#3fc88c;
    --warn:#d98a2b; --danger:#c14b4b; --chip:#283642;
    --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent2);text-decoration:none}
  header{position:sticky;top:0;z-index:50;background:rgba(15,20,25,.92);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top{max-width:1240px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#06140d}
  .brand h1{font-size:17px;font-weight:700;letter-spacing:.3px}
  .brand p{font-size:12px;color:var(--txt2)}
  nav{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  nav button{background:transparent;border:1px solid transparent;color:var(--txt2);
    padding:8px 14px;border-radius:9px;cursor:pointer;font-size:14px;transition:.2s}
  nav button:hover{color:var(--txt);background:var(--panel)}
  nav button.active{color:#06140d;background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:700}
  .adminbadge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--warn);color:#1a1206;font-weight:700;margin-left:6px}
  main{max-width:1240px;margin:0 auto;padding:26px 22px 80px;min-height:50vh}
  .hero{background:linear-gradient(135deg,#16241c,#1a2129);border:1px solid var(--line);
    border-radius:18px;padding:32px;box-shadow:var(--shadow);margin-bottom:24px}
  .hero h2{font-size:26px;margin-bottom:6px}
  .hero .en{color:var(--txt2);font-size:14px;margin-bottom:18px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:20px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat b{display:block;font-size:22px;color:var(--accent2)}
  .stat span{font-size:12px;color:var(--txt2)}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);color:var(--txt2);
    padding:4px 11px;border-radius:20px;font-size:12px;margin:3px 4px 0 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.2s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
  .card .thumb{width:100%;aspect-ratio:1/1;object-fit:cover;background:#0b0f13}
  .card .body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card .pid{font-size:11px;color:var(--accent2);font-weight:700;letter-spacing:.5px}
  .card .name{font-size:13.5px;font-weight:600;line-height:1.45;min-height:38px}
  .card .price{font-size:15px;color:var(--warn);font-weight:700}
  .card .moq{font-size:12px;color:var(--txt2)}
  .card .acts{display:flex;gap:8px;margin-top:auto;padding-top:8px}
  .card .acts a,.card .acts button{flex:1;text-align:center;font-size:12px;padding:7px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer;transition:.2s}
  .card .acts a:hover,.card .acts button:hover{background:var(--accent);color:#06140d;border-color:var(--accent)}
  .card .acts .delp{background:var(--danger);color:#fff;border-color:var(--danger)}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    color:var(--txt);padding:12px 14px 12px 40px;font-size:14px}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search svg{position:absolute;left:13px;top:13px;opacity:.5}
  .count{background:var(--chip);border:1px solid var(--line);padding:9px 14px;border-radius:11px;font-size:13px;color:var(--txt2);white-space:nowrap}
  .sec-title{font-size:20px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .sec-title .bar{width:4px;height:22px;background:linear-gradient(var(--accent),var(--accent2));border-radius:3px}
  .sec-sub{color:var(--txt2);font-size:13px;margin-bottom:22px}
  .qrow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
  .qrow .q{font-weight:700;color:var(--accent2);margin-bottom:6px;font-size:14.5px}
  .qrow .a{color:var(--txt);font-size:14px;white-space:pre-wrap}
  .qrow .meta{font-size:11px;color:var(--txt2);margin-top:8px}
  .qrow .copy{float:right;font-size:11px;background:var(--chip);border:1px solid var(--line);color:var(--txt2);padding:4px 10px;border-radius:7px;cursor:pointer;margin-left:6px}
  .qrow .copy:hover{background:var(--accent);color:#06140d}
  .qrow .delq{float:right;font-size:11px;background:var(--danger);border:1px solid var(--danger);color:#fff;padding:4px 10px;border-radius:7px;cursor:pointer}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
  .panel h3{font-size:16px;margin-bottom:14px;color:var(--accent2)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--txt2);margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;color:var(--txt);padding:10px 12px;font-size:14px;font-family:inherit}
  .field textarea{min-height:80px;resize:vertical}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06140d;border:none;
    padding:11px 22px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:var(--chip);color:var(--txt);border:1px solid var(--line)}
  .btn-danger{background:var(--danger);color:#fff}
  .manual-item{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;
    margin-bottom:10px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .manual-item .mi-body{flex:1;font-size:13px}
  .manual-item .mi-body b{color:var(--accent2)}
  .del{background:var(--danger);color:#fff;border:none;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;white-space:nowrap}
  .empty{color:var(--txt2);font-size:13px;padding:14px;text-align:center;border:1px dashed var(--line);border-radius:10px}
  footer{text-align:center;color:var(--txt2);font-size:12px;padding:30px;border-top:1px solid var(--line)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--accent);color:#06140d;
    padding:12px 24px;border-radius:10px;font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:99;max-width:90%}
  .toast.show{opacity:1}
  .toast.err{background:var(--danger);color:#fff}
  .loading{text-align:center;padding:60px 20px;color:var(--txt2)}
  .spin{display:inline-block;width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  /* login modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal.show{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:var(--shadow)}
  .modal h3{font-size:18px;margin-bottom:8px}
  .modal p{color:var(--txt2);font-size:13px;margin-bottom:16px}
  .savebar{position:sticky;top:64px;z-index:40;background:rgba(217,138,43,.14);border:1px solid var(--warn);
    border-radius:10px;padding:10px 16px;margin-bottom:18px;display:none;align-items:center;gap:12px;flex-wrap:wrap}
  .savebar.show{display:flex}
  .savebar span{flex:1;font-size:13px;color:var(--warn);min-width:160px}
  @media(max-width:600px){.hero{padding:22px}.hero h2{font-size:21px}nav{width:100%}}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo">AY</div>
      <div>
        <h1>爱以思 · 公司知识库 <span id="adminBadge" class="adminbadge" style="display:none">管理模式</span></h1>
        <p>Taizhou Aiyisi Leisure Products Co., Ltd.</p>
      </div>
    </div>
    <nav id="nav"></nav>
  </div>
</header>
<main id="main"><div class="loading"><div class="spin"></div><p style="margin-top:14px">正在加载知识库数据…</p></div></main>
<div class="toast" id="toast"></div>

<!-- 管理员登录弹窗 -->
<div class="modal" id="loginModal">
  <div class="box">
    <h3>企业内部后台登录</h3>
    <p>请输入管理令牌（GitHub Token）。仅供内部管理人员使用，令牌仅保存在你本机浏览器，不会上传或泄露。</p>
    <div class="field"><label>管理令牌</label><input id="tokenInput" type="password" placeholder="ghp_ 或 gho_ 开头的令牌"></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" onclick="doLogin()">登录后台</button>
      <button class="btn btn-ghost" onclick="closeLogin()">取消</button>
    </div>
    <p style="margin-top:14px;font-size:12px">忘记令牌？联系网站管理员重新获取。</p>
  </div>
</div>

<!-- 编辑/新增弹窗 -->
<div class="modal" id="editModal"></div>

<footer id="footer">爱以思公司知识库 · 数据来源 aiyisi.en.alibaba.com</footer>

<script>
/* ===================== CONFIG ===================== */
const GH_OWNER="304631238";
const GH_REPO="aiyisi-knowledge-base";
const GH_BRANCH="main";
const DATA_PATH="data.json";
const SAME_URL=`./${DATA_PATH}`; // 同源（GitHub Pages 托管）
const RAW_URL=`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${DATA_PATH}`; // 回退源
const API_CONTENT=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${DATA_PATH}`;
const LS_TOKEN="aiyisi_admin_token";

/* ===================== STATE ===================== */
let DB=null;              // 整个 data.json
let DATA_SHA=null;        // data.json 当前 sha（写回需要）
let DIRTY=false;          // 是否有未保存改动
const IS_ADMIN_URL=/[?&]admin\b/.test(location.search);
function token(){return localStorage.getItem(LS_TOKEN)||""}
function isAdmin(){return IS_ADMIN_URL && !!token()}

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function toast(msg,err){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(err?" err":"");setTimeout(()=>t.className="toast",err?3200:1800)}

/* ===================== LOAD DATA ===================== */
async function loadDB(){
  const sources=[SAME_URL,RAW_URL];
  let lastErr=null;
  for(const base of sources){
    try{
      const res=await fetch(base+"?t="+Date.now(),{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      DB=await res.json();
      lastErr=null;break;
    }catch(e){lastErr=e;}
  }
  if(lastErr){
    document.getElementById("main").innerHTML=`<div class="loading"><p style="color:var(--danger)">数据加载失败：${esc(lastErr.message)}</p><p style="margin-top:10px">请检查网络后刷新页面。</p></div>`;
    return false;
  }
  // 兜底字段
  DB.products=DB.products||[];DB.scripts=DB.scripts||[];
  DB.intel=DB.intel||[];DB.certs=DB.certs||[];DB.brand=DB.brand||[];
  return true;
}
function allProducts(){return DB.products}
function allScripts(){return DB.scripts}
function allIntel(){return DB.intel}
function allCerts(){return DB.certs}

/* ===================== NAV ===================== */
function buildNav(){
  const tabs=[["home","首页"],["identity","身份/资质"],["products","产品/Q&A"],["intel","情报/画像"],["scripts","话术/SOP"],["brand","品牌资产"]];
  const nav=document.getElementById("nav");
  nav.innerHTML=tabs.map(([t,l])=>`<button data-t="${t}">${l}</button>`).join("")
    + (IS_ADMIN_URL && !isAdmin()?`<button data-t="login" style="color:var(--warn)">🔒 后台登录</button>`:"")
    + (isAdmin()?`<button data-t="logout" style="color:var(--txt2)">退出</button>`:"");
  document.getElementById("adminBadge").style.display=isAdmin()?"inline-block":"none";
}

/* ===================== RENDER ===================== */
function renderHome(){
  const C=DB.company;
  return `<div class="hero">
    <h2>${esc(C.name_cn)}</h2>
    <div class="en">${esc(C.name_en)} · ${esc(C.region)}</div>
    <p>${esc(C.years)} ｜ ${esc(C.type)} ｜ ${esc(C.rank)}</p>
    <div style="margin-top:14px">${(C.cats||"").split("、").map(c=>`<span class="tag">${esc(c)}</span>`).join("")}</div>
    <div class="stats">
      <div class="stat"><b>${allProducts().length}</b><span>在库产品款数</span></div>
      <div class="stat"><b>${allScripts().length}</b><span>销售话术/SOP</span></div>
      <div class="stat"><b>${esc(C.rating||"5.0★")}</b><span>店铺评分</span></div>
      <div class="stat"><b>100%</b><span>准时发货率</span></div>
      <div class="stat"><b>≤3h</b><span>询盘响应</span></div>
      <div class="stat"><b>25000m²</b><span>厂区面积</span></div>
    </div>
  </div>
  <div class="panel"><h3>公司速览</h3>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">
      ${[["成立年份",C.founded],["企业类型",C.type],["员工规模",C.staff],["年产值",C.revenue],["研发团队",C.rd],["主营市场",C.markets],["响应能力",C.response],["大客户",C.bigClients]].map(([k,v])=>`<div class="manual-item"><div class="mi-body"><b>${esc(k)}</b><br>${esc(v)}</div></div>`).join("")}
    </div>
    <p style="margin-top:14px;color:var(--txt2);font-size:13px">数据来源：<a href="${esc(C.url)}" target="_blank">${esc(C.url)}</a></p>
  </div>`;
}
function adminBtns(type,id){
  if(!isAdmin())return "";
  return `<button class="copy" style="background:var(--chip)" onclick="openEdit('${type}','${esc(id)}')">编辑</button>`+
         `<button class="delq" onclick="delItem('${type}','${esc(id)}')">删除</button>`;
}
function renderIdentity(){
  return `<div class="sec-title"><span class="bar"></span>身份 / 资质</div>
  <div class="sec-sub">公司认证、贸易保障与定制能力。${isAdmin()?'<span style="color:var(--warn)"> · 管理模式：可编辑/删除每一条</span>':''}</div>
  ${isAdmin()?`<button class="btn" style="margin-bottom:16px" onclick="openEdit('certs','')">+ 新增资质</button>`:''}
  ${allCerts().map(c=>`<div class="qrow">${adminBtns('certs',c.id)}<div class="q">${esc(c.t)}</div><div class="a">${esc(c.d)}</div></div>`).join("")}`;
}
function renderProducts(filter=""){
  const list=allProducts().filter(p=>(p.name+p.id).toLowerCase().includes(filter.toLowerCase()));
  return `<div class="sec-title"><span class="bar"></span>产品 / Q&amp;A</div>
  <div class="sec-sub">店铺真实产品矩阵，支持搜索。</div>
  <div class="toolbar">
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="psearch" placeholder="搜索产品名称 / 编号..." value="${esc(filter)}"></div>
    <div class="count">${list.length} 款</div>
  </div>
  ${isAdmin()?`<button class="btn" style="margin-bottom:16px" onclick="openEdit('products','')">+ 新增产品</button>`:''}
  <div class="grid">${list.map(p=>`
    <div class="card">
      <img class="thumb" src="${esc(p.img)}" loading="lazy" alt="${esc(p.name)}" onerror="this.style.opacity=.3">
      <div class="body">
        <div class="pid">${esc(p.id)}</div>
        <div class="name">${esc(p.name)}</div>
        <div class="price">${esc(p.price||'询价')}</div>
        <div class="moq">起订量：${esc(p.moq||'-')}</div>
        <div class="acts">
          ${p.url?`<a href="${esc(p.url)}" target="_blank">查看详情</a>`:''}
          <button onclick="copyTxt(this.dataset.n)" data-n="${esc(p.name)}">复制名称</button>
          ${isAdmin()?`<button onclick="openEdit('products','${esc(p.id)}')">编辑</button><button class="delp" onclick="delItem('products','${esc(p.id)}')">删除</button>`:''}
        </div>
      </div>
    </div>`).join("")}</div>`;
}
function renderIntel(){
  return `<div class="sec-title"><span class="bar"></span>情报 / 画像</div>
  <div class="sec-sub">客户结构、市场画像、采购决策关键词。${isAdmin()?'<span style="color:var(--warn)"> · 管理模式：可编辑/删除每一条</span>':''}</div>
  ${isAdmin()?`<button class="btn" style="margin-bottom:16px" onclick="openEdit('intel','')">+ 新增情报</button>`:''}
  ${allIntel().map(i=>`<div class="qrow">${adminBtns('intel',i.id)}<div class="q">${esc(i.t)}</div><div class="a">${esc(i.d)}</div></div>`).join("")}`;
}
function renderScripts(filter=""){
  const list=allScripts().filter(s=>(s.t+s.c+s.cat+s.id).toLowerCase().includes(filter.toLowerCase()));
  return `<div class="sec-title"><span class="bar"></span>话术 / SOP</div>
  <div class="sec-sub">B2B 户外地垫销售全流程话术，点复制即用。</div>
  <div class="toolbar">
    <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="ssearch" placeholder="搜索话术 / 场景 / 编号..." value="${esc(filter)}"></div>
    <div class="count">${list.length} 条</div>
  </div>
  ${isAdmin()?`<button class="btn" style="margin-bottom:16px" onclick="openEdit('scripts','')">+ 新增话术</button>`:''}
  ${list.map(s=>`<div class="qrow">
    <button class="copy" onclick="copyTxt(this.dataset.c)" data-c="${esc(s.c)}">复制</button>
    ${adminBtns('scripts',s.id)}
    <div class="q">${esc(s.id)} · ${esc(s.t)}</div>
    <div class="a">${esc(s.c)}</div>
    <div class="meta">场景：${esc(s.cat||'-')}</div>
  </div>`).join("")}`;
}
function renderBrand(){
  return `<div class="sec-title"><span class="bar"></span>品牌资产</div>
  <div class="sec-sub">品牌定位、核心品类、市场与背书。${isAdmin()?'<span style="color:var(--warn)"> · 管理模式：可编辑/删除每一条</span>':''}</div>
  ${isAdmin()?`<button class="btn" style="margin-bottom:16px" onclick="openEdit('brand','')">+ 新增品牌项</button>`:''}
  ${(DB.brand||[]).map(b=>`<div class="qrow">${adminBtns('brand',b.id)}<div class="q">${esc(b.t)}</div><div class="a">${esc(b.d)}</div></div>`).join("")}`;
}
/* ===================== EDIT SCHEMA ===================== */
/* 每种类型的字段定义：key=数据字段, label=显示名, type=input/textarea, required, placeholder, idprefix */
const SCHEMA={
  products:{title:"产品",idprefix:"AY",fields:[
    {k:"name",label:"产品名称",type:"input",required:true,ph:"如：New PP Reversible Outdoor Rug 8x10"},
    {k:"price",label:"价格",type:"input",ph:"如：$6.5-9.0"},
    {k:"moq",label:"起订量",type:"input",ph:"如：200 pieces"},
    {k:"img",label:"图片链接",type:"input",ph:"https://...jpg"},
    {k:"url",label:"详情链接",type:"input",ph:"https://www.alibaba.com/product-detail/..."}
  ]},
  scripts:{title:"话术",idprefix:"S",fields:[
    {k:"cat",label:"场景分类",type:"input",ph:"如：报价 / 催单 / 售后"},
    {k:"t",label:"话术标题",type:"input",required:true,ph:"如：大客户专属折扣话术"},
    {k:"c",label:"话术内容",type:"textarea",ph:"输入话术正文..."}
  ]},
  intel:{title:"情报",idprefix:"I",fields:[
    {k:"t",label:"标题",type:"input",required:true,ph:"如：德国买家偏好"},
    {k:"d",label:"内容",type:"textarea",ph:"输入情报内容..."}
  ]},
  certs:{title:"资质",idprefix:"C",fields:[
    {k:"t",label:"标题",type:"input",required:true,ph:"如：BSCI 认证"},
    {k:"d",label:"内容",type:"textarea",ph:"输入资质内容..."}
  ]},
  brand:{title:"品牌项",idprefix:"B",fields:[
    {k:"t",label:"标题",type:"input",required:true,ph:"如：品牌口号"},
    {k:"d",label:"内容",type:"textarea",ph:"输入内容..."}
  ]}
};
let EDIT_TYPE=null, EDIT_ID=null;

function openEdit(type,id){
  if(!isAdmin())return;
  EDIT_TYPE=type;EDIT_ID=id;
  const sc=SCHEMA[type];
  const item=id?DB[type].find(x=>String(x.id)===String(id)):{};
  const isNew=!id;
  const html=`<div class="box" style="max-height:88vh;overflow:auto">
    <h3>${isNew?'新增':'编辑'}${sc.title}</h3>
    <p>${isNew?'填写后保存，将同步到公开链接。':'修改后保存，将同步到公开链接，客户刷新即见。'}</p>
    ${sc.fields.map(f=>`<div class="field"><label>${f.label}${f.required?' *':''}</label>${
      f.type==="textarea"
        ?`<textarea id="ef_${f.k}" placeholder="${esc(f.ph||'')}">${esc((item&&item[f.k])||"")}</textarea>`
        :`<input id="ef_${f.k}" placeholder="${esc(f.ph||'')}" value="${esc((item&&item[f.k])||"")}">`
    }</div>`).join("")}
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" id="editSaveBtn" onclick="saveEdit()">保存</button>
      <button class="btn btn-ghost" onclick="closeEdit()">取消</button>
    </div>
  </div>`;
  const modal=document.getElementById("editModal");
  modal.innerHTML=html;modal.classList.add("show");
  setTimeout(()=>{const e=document.querySelector('#editModal [id^="ef_"]');if(e)e.focus();},100);
}
function closeEdit(){const m=document.getElementById("editModal");m.classList.remove("show");m.innerHTML="";EDIT_TYPE=EDIT_ID=null;}

async function saveEdit(){
  const type=EDIT_TYPE,sc=SCHEMA[type];
  const obj={};
  for(const f of sc.fields){
    const el=document.getElementById("ef_"+f.k);
    const v=el?el.value.trim():"";
    if(f.required && !v)return toast("请填写「"+f.label+"」",true);
    obj[f.k]=v;
  }
  // 产品图兜底
  if(type==="products" && !obj.img) obj.img="https://img.alicdn.com/imgextra/i1/O1CN01YyMrnH1TH65JNfJZU_!!6000000002356-2-tps-600-600.png";
  const btn=document.getElementById("editSaveBtn");if(btn){btn.disabled=true;btn.textContent="保存中…";}
  let msg;
  if(EDIT_ID){ // 编辑
    const it=DB[type].find(x=>String(x.id)===String(EDIT_ID));
    Object.assign(it,obj);
    msg="Edit "+type+": "+(obj.t||obj.name||EDIT_ID);
  }else{ // 新增
    obj.id=uid(sc.idprefix+"-M");
    DB[type].push(obj);
    msg="Add "+type+": "+(obj.t||obj.name||obj.id);
  }
  const ok=await saveDB(msg);
  if(ok){closeEdit();const cur=document.querySelector("#nav button.active");show(cur?cur.dataset.t:"home");}
  else{if(btn){btn.disabled=false;btn.textContent="保存";}}
}

async function delItem(type,id){
  if(!isAdmin())return;
  if(!confirm("确定删除这条内容？删除后客户也将看不到。"))return;
  const arr=DB[type];
  const idx=arr.findIndex(x=>String(x.id)===String(id));
  if(idx<0)return toast("未找到该条目",true);
  const removed=arr.splice(idx,1)[0];
  if(await saveDB("Delete "+type+": "+id)){const cur=document.querySelector("#nav button.active");show(cur?cur.dataset.t:"home");}
  else{arr.splice(idx,0,removed);}
}

/* ===================== WRITE BACK TO GITHUB ===================== */
async function saveDB(commitMsg){
  if(!isAdmin()){toast("未登录后台，无法保存",true);return false}
  toast("正在保存到服务器…");
  try{
    // 取最新 sha（避免冲突）
    const meta=await fetch(API_CONTENT+"?t="+Date.now(),{headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json"},cache:"no-store"});
    if(meta.ok){const mj=await meta.json();DATA_SHA=mj.sha;}
    DB._updated=new Date().toISOString();
    const content=JSON.stringify(DB,null,2);
    const b64=btoa(unescape(encodeURIComponent(content)));
    const res=await fetch(API_CONTENT,{
      method:"PUT",
      headers:{Authorization:"token "+token(),Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({message:commitMsg||"Update knowledge base",content:b64,sha:DATA_SHA,branch:GH_BRANCH})
    });
    if(!res.ok){const er=await res.json();throw new Error(er.message||("HTTP "+res.status))}
    const rj=await res.json();
    DATA_SHA=rj.content.sha;
    toast("已保存，客户刷新即可见最新内容");
    return true;
  }catch(e){
    toast("保存失败："+e.message,true);
    return false;
  }
}

function uid(prefix){return prefix+Date.now().toString(36)+Math.floor(Math.random()*900+100)}

/* ===================== LOGIN ===================== */
function openLogin(){document.getElementById("loginModal").classList.add("show");setTimeout(()=>{const i=document.getElementById("tokenInput");if(i)i.focus();},100)}
function closeLogin(){document.getElementById("loginModal").classList.remove("show")}
async function doLogin(){
  const tk=document.getElementById("tokenInput").value.trim();
  if(!tk)return toast("请输入管理令牌",true);
  toast("正在验证令牌…");
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{Authorization:"token "+tk}});
    if(!r.ok)throw new Error("令牌无效或无权限");
    const j=await r.json();
    if(!j.permissions||!j.permissions.push)throw new Error("该令牌没有写入权限");
    localStorage.setItem(LS_TOKEN,tk);
    closeLogin();toast("登录成功，已进入管理模式，每页可直接编辑/删除");
    buildNav();show("products");
  }catch(e){toast("登录失败："+e.message,true)}
}
function logout(){localStorage.removeItem(LS_TOKEN);toast("已退出管理模式");buildNav();show("home");}

/* ===================== MISC ===================== */
function copyTxt(t){navigator.clipboard.writeText(t).then(()=>toast("已复制")).catch(()=>toast("复制失败",true))}

/* ===================== ROUTER ===================== */
const VIEWS={home:renderHome,identity:renderIdentity,products:renderProducts,intel:renderIntel,scripts:renderScripts,brand:renderBrand};
function show(t){
  if(t==="login"){openLogin();return}
  if(t==="logout"){logout();return}
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.t===t));
  const fn=VIEWS[t]||renderHome;
  document.getElementById("main").innerHTML=fn();
  if(t==="products"){const i=document.getElementById("psearch");if(i)i.addEventListener("input",e=>{const v=e.target.value;document.getElementById("main").innerHTML=renderProducts(v);const ni=document.getElementById("psearch");ni.focus();ni.setSelectionRange(v.length,v.length);});}
  if(t==="scripts"){const i=document.getElementById("ssearch");if(i)i.addEventListener("input",e=>{const v=e.target.value;document.getElementById("main").innerHTML=renderScripts(v);const ni=document.getElementById("ssearch");ni.focus();ni.setSelectionRange(v.length,v.length);});}
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ===================== INIT ===================== */
(async function init(){
  const ok=await loadDB();
  if(!ok)return;
  buildNav();
  document.getElementById("nav").addEventListener("click",e=>{if(e.target.dataset.t)show(e.target.dataset.t)});
  // 管理链接但未登录 → 自动弹登录
  if(IS_ADMIN_URL && !isAdmin()){show("home");openLogin();}
  else show("home");
})();
</script>
